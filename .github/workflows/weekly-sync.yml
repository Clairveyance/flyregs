name: Weekly FAA Sync

# Runs the same 8-stage pipeline that used to run via launchd on a single
# Mac (scrape -> disclose vision recoveries -> OCR fixes -> parse backfill ->
# figure/table sync -> parser audit -> figure coverage check -> update alerts).
# Moving it here means the weekly update no longer depends on any one machine
# being powered on and awake at 3am.
#
# Alerting: if the sync finds something that needs a human (a real parser
# anomaly, a touched AC ending up with zero content, an unresolved
# figure-coverage gap, or the scraper's own vision-recovery circuit breaker
# tripping), sync.sh's steps exit non-zero and this whole job shows as
# FAILED — check via `gh run list --workflow=weekly-sync.yml` any time,
# rather than relying on someone reading the run log. See sync.sh's header
# for exactly which findings are high-confidence (block) vs. informational
# (logged, known false-positive rate, don't block).
#
# Manual runs: use the "Run workflow" button in the Actions tab (the
# workflow_dispatch trigger below) — handy for testing without waiting for
# the schedule, and lets you pass --full or --dry-run.
#
# `contents: write` is needed for the one case where sync.sh's step 2 (see
# sync.sh's own header) actually changes something in the repo: if step 1's
# text-health check found a flattened/signed PDF and recovered it via
# vision, the doc_number gets appended to src/lib/ocrScannedACs.ts (a
# client-side source file — the app's own disclaimer needs the SOURCE
# updated + rebuilt, not just the database) and committed back to main by
# this workflow. This is the only file this workflow ever writes to the
# repo, and only ever appends to it — see append_ocr_scanned_acs.mjs.

permissions:
  contents: write

on:
  schedule:
    # 10:00 UTC every Monday. Adjust to your preferred time — GitHub Actions
    # cron is always UTC, unlike the old launchd job which ran in local time.
    - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
          - dry-run

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Python dependencies
        run: pip install -r sync/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Write .env.scraper from secrets
        run: |
          cat > .env.scraper <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      - name: Run sync
        run: |
          chmod +x sync.sh
          case "${{ github.event.inputs.mode }}" in
            full)     ./sync.sh --full ;;
            dry-run)  ./sync.sh --dry-run ;;
            *)        ./sync.sh ;;
          esac

      - name: Clean up secrets file
        if: always()
        run: rm -f .env.scraper

      - name: Commit any newly-disclosed vision recoveries
        # Almost always a no-op — src/lib/ocrScannedACs.ts only changes when
        # this run's text-health check actually recovered a flattened/signed
        # PDF via vision (see sync.sh step 2). Never touches anything else.
        run: |
          if ! git diff --quiet -- src/lib/ocrScannedACs.ts; then
            git config user.name "flyregs-weekly-sync"
            git config user.email "actions@github.com"
            git add src/lib/ocrScannedACs.ts
            git commit -m "Auto-disclose vision-recovered AC(s) in OCR_SCANNED_ACS (see vision_recovery_log for detail)"
            git push
          else
            echo "No changes to src/lib/ocrScannedACs.ts — nothing to commit."
          fi
